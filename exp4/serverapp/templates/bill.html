
<html>
<head>
<title>GST Bill Calculator</title>

<style>

body{
margin:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:35px;
width:320px;
border-radius:10px;
text-align:center;
}

h2{
margin-bottom:20px;
}

label{
display:block;
margin-top:10px;
}

input{
width:90%;
padding:8px;
margin-top:5px;
}

button{
margin-top:20px;
padding:10px 20px;
background:blue;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.result{
margin-top:20px;
font-weight:bold;
color:black;
}

</style>

</head>

<body>

<div class="container">

<h2>GST Bill Calculator</h2>

<form method="post">
{% csrf_token %}

<label>Price (₹)</label>
<input type="number" name="price" required>

<label>GST (%)</label>
<input type="number" name="gst" required>

<button type="submit">Calculate</button>

</form>

{% if total %}
<div class="result">
Total Bill Amount: ₹{{ total }}
</div>
{% endif %}

</div>

</body>
</html>
